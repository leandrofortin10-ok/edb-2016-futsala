  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EDB Cat.2016">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>EDB Cat.2016</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Deshabilitar descarga de videos */
    video::-webkit-media-controls-enclosure { overflow: hidden; }
    video::-webkit-media-controls-panel { width: calc(100% + 30px); }
    video::-internal-media-controls-download-button { display: none !important; }
    video::--webkit-media-controls-download-button { display: none !important; }
  </style>
  <script>
    // Bloquear menú contextual en videos para evitar "Guardar video como..."
    document.addEventListener('contextmenu', function(e) {
      if (e.target && e.target.tagName === 'VIDEO') e.preventDefault();
    }, true);
  </script>
</head>
<body>
  <script>
    // Limpiar service workers viejos de Flutter que impiden actualizaciones.
    // Sin SW, la app siempre carga la versión más reciente del servidor.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        var hadSW = false;
        for (var reg of registrations) {
          // Preservar el SW de Firebase Messaging — es el que recibe los push en background
          var swUrl = (reg.active || reg.installing || reg.waiting || {}).scriptURL || '';
          if (swUrl.includes('firebase-messaging-sw')) continue;
          reg.unregister();
          hadSW = true;
        }
        // Limpiar caches del SW viejo
        if (hadSW && 'caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) { caches.delete(name); }
          }).then(function() {
            // Recargar limpio solo si había SW activo (una sola vez)
            if (!sessionStorage.getItem('sw_cleared')) {
              sessionStorage.setItem('sw_cleared', '1');
              location.reload();
            }
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <script type="module">
    // Registra el token FCM en Firestore cuando Flutter termina de cargar.
    // Se hace en JS puro para no bloquear la inicialización de Flutter.
    async function registerFcmToken() {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'denied') return;

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        const { getApp }       = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
        const { getMessaging, getToken } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging.js');
        const { getFirestore, doc, setDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js');

        const app       = getApp();
        const messaging = getMessaging(app);
        const token     = await getToken(messaging, {
          vapidKey: 'BCKqChkY1vAgc9-9oBNw0Ag6uaayB744ZAl2wY43uKSU1UTAMnUhFSy19yiewT-vAzoPqWHmJZBzLdkqYRBszGY',
        });
        if (!token) return;

        const env = window.location.hostname.includes('--dev-') ? 'dev' : 'prod';
        await setDoc(doc(getFirestore(app), 'push_tokens', token), {
          createdAt: serverTimestamp(),
          platform: 'web',
          env,
        });
      } catch (_) {
        // Nunca crashear la app por el setup de notificaciones
      }
    }

    // Esperar a que Flutter renderice el primer frame antes de registrar
    window.addEventListener('flutter-first-frame', registerFcmToken);
  </script>
</body>
</html>
