<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Seguimiento del equipo Estrella de Boedo">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EDB Cat.2016">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>EDB Cat.2016</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Limpiar service workers viejos de Flutter que impiden actualizaciones.
    // Sin SW, la app siempre carga la versión más reciente del servidor.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        var hadSW = false;
        for (var reg of registrations) {
          reg.unregister();
          hadSW = true;
        }
        // Limpiar caches del SW viejo
        if (hadSW && 'caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) { caches.delete(name); }
          }).then(function() {
            // Recargar limpio solo si había SW activo (una sola vez)
            if (!sessionStorage.getItem('sw_cleared')) {
              sessionStorage.setItem('sw_cleared', '1');
              location.reload();
            }
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
