<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Seguimiento del equipo Estrella de Boedo">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EDB Cat.2016">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>EDB Cat.2016</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Deshabilitar descarga de videos */
    video::-webkit-media-controls-enclosure { overflow: hidden; }
    video::-webkit-media-controls-panel { width: calc(100% + 30px); }
    video::-internal-media-controls-download-button { display: none !important; }
    video::--webkit-media-controls-download-button { display: none !important; }
  </style>
  <script>
    // Bloquear menú contextual en videos para evitar "Guardar video como..."
    document.addEventListener('contextmenu', function(e) {
      if (e.target && e.target.tagName === 'VIDEO') e.preventDefault();
    }, true);
  </script>
</head>
<body>
  <script>
    // Limpiar service workers viejos de Flutter que impiden actualizaciones.
    // Sin SW, la app siempre carga la versión más reciente del servidor.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        var hadSW = false;
        for (var reg of registrations) {
          // Preservar el SW de Firebase Messaging — es el que recibe los push en background
          var swUrl = (reg.active || reg.installing || reg.waiting || {}).scriptURL || '';
          if (swUrl.includes('firebase-messaging-sw')) continue;
          reg.unregister();
          hadSW = true;
        }
        // Limpiar caches del SW viejo
        if (hadSW && 'caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) { caches.delete(name); }
          }).then(function() {
            // Recargar limpio solo si había SW activo (una sola vez)
            if (!sessionStorage.getItem('sw_cleared')) {
              sessionStorage.setItem('sw_cleared', '1');
              location.reload();
            }
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Carga un script externo dinámicamente
    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
        var s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // Registra el token FCM en Firestore después de que Flutter carga.
    // Usa el SDK compat (comparte instancia con Flutter) y REST API de Firestore.
    async function registerFcmToken() {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'denied') return;

        var permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        var BASE = 'https://www.gstatic.com/firebasejs/10.7.0';
        await loadScript(BASE + '/firebase-app-compat.js');
        await loadScript(BASE + '/firebase-messaging-compat.js');

        // Inicializar solo si Flutter aún no lo hizo
        if (!firebase.apps.length) {
          firebase.initializeApp({
            apiKey: 'AIzaSyCnCLB7glTXLw_xvAD30oayZflG_gnDTEk',
            authDomain: 'edb-estrella.firebaseapp.com',
            projectId: 'edb-estrella',
            storageBucket: 'edb-estrella.appspot.com',
            messagingSenderId: '259850372896',
            appId: '1:259850372896:web:12c891d2eb82e1b097f945',
          });
        }

        var messaging = firebase.messaging();

        // Mostrar notificación cuando la app está en primer plano
        messaging.onMessage(function(payload) {
          var title = payload.notification && payload.notification.title;
          var body  = payload.notification && payload.notification.body;
          if (!title) return;
          navigator.serviceWorker.ready.then(function(reg) {
            reg.showNotification(title, { body: body || '', icon: '/icons/Icon-192.png' });
          });
        });

        var token = await messaging.getToken({
          vapidKey: 'BCKqChkY1vAgc9-9oBNw0Ag6uaayB744ZAl2wY43uKSU1UTAMnUhFSy19yiewT-vAzoPqWHmJZBzLdkqYRBszGY',
        });
        if (!token) return;

        var env = window.location.hostname.includes('--dev-') ? 'dev' : 'prod';

        // Escribir en Firestore vía REST API (la colección permite escritura pública)
        await fetch(
          'https://firestore.googleapis.com/v1/projects/edb-estrella/databases/(default)/documents/push_tokens/' + token,
          {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                platform:  { stringValue: 'web' },
                env:       { stringValue: env },
                createdAt: { timestampValue: new Date().toISOString() },
              },
            }),
          }
        );
      } catch (e) {
        console.error('FCM token registration failed:', e);
      }
    }

    // Ejecutar cuando Flutter dispare el primer frame, o tras 5 seg como fallback
    var _fcmRegistered = false;
    function tryRegisterFcm() {
      if (_fcmRegistered) return;
      _fcmRegistered = true;
      registerFcmToken();
    }
    window.addEventListener('flutter-first-frame', tryRegisterFcm);
    setTimeout(tryRegisterFcm, 5000);
  </script>
</body>
</html>
